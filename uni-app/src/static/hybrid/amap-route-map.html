<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>赛道地图</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #map { width: 100%; height: 100%; }
    #status {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      text-align: center;
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #64748b;
      background: #f1f5f9;
      z-index: 2;
    }
    #status.hidden { display: none; }
  </style>
</head>
<body>
  <div id="status">等待地图配置…</div>
  <div id="map"></div>
  <script src="https://js.cdn.aliyun.dcloud.net.cn/dev/uni-app/uni.webview.1.5.6.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@amap/amap-jsapi-loader@1.0.1/dist/index.min.js"></script>
  <script>
    const MARKER_TYPE_LABELS = {
      start: '起点', finish: '终点', aid: '补给', medical: '医疗', cp: '检查点', other: '点位',
    };
    const MARKER_COLORS = {
      start: { bg: '#10b981', color: '#ffffff' },
      finish: { bg: '#7c3aed', color: '#ffffff' },
      aid: { bg: '#0891b2', color: '#ffffff' },
      medical: { bg: '#dc2626', color: '#ffffff' },
      cp: { bg: '#d97706', color: '#ffffff' },
      other: { bg: '#64748b', color: '#ffffff' },
    };

    let map = null;
    let line = null;
    let markerHeat = {};
    let selectedId = null;
    let amapCfg = null;
    let overlayMap = new Map();
    let loadPromise = null;
    let lastFitKey = '';

    const statusEl = document.getElementById('status');

    function setStatus(text, hide) {
      statusEl.textContent = text || '';
      statusEl.classList.toggle('hidden', !!hide);
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function markerLabelHtml(m, selected, heatLevel) {
      const type = m.type || 'other';
      let bg = MARKER_COLORS[type]?.bg || MARKER_COLORS.other.bg;
      const color = MARKER_COLORS[type]?.color || '#fff';
      if (heatLevel === 'warning') bg = '#ea580c';
      if (heatLevel === 'critical') bg = '#dc2626';
      const text = escapeHtml((m.label || '').trim() || MARKER_TYPE_LABELS[type] || '点位');
      const ring = selected ? 'box-shadow:0 0 0 2px #fff,0 0 0 4px #0891b2;' : '';
      const pulse = heatLevel === 'critical' ? 'animation:pulse 1s infinite;' : '';
      const warn = heatLevel === 'warning' ? 'box-shadow:0 0 0 2px #f97316;' : '';
      return `<div style="background:${bg};color:${color};padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;white-space:nowrap;${ring}${pulse}${warn}">${selected ? '▶ ' : ''}${text}</div>`;
    }

    function postToHost(payload) {
      try {
        if (typeof uni !== 'undefined' && uni.postMessage) {
          uni.postMessage({ data: [payload] });
        }
      } catch (e) { /* ignore */ }
      try {
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ source: 'duimai-amap-webview', ...payload }, '*');
        }
      } catch (e) { /* ignore */ }
    }

    function geometryKey(l) {
      if (!l) return '';
      return l.id + ':' + (l.path?.length || 0) + ':' + (l.markers || []).map((m) => m.id).join(',');
    }

    async function loadAmap() {
      if (!amapCfg?.enabled || !amapCfg.apiKey) throw new Error('高德地图未配置');
      const key = amapCfg.apiKey.trim();
      const security = (amapCfg.securityJsCode || '').trim();
      if (security) {
        window._AMapSecurityConfig = { securityJsCode: security };
      }
      if (!loadPromise) {
        loadPromise = AMapLoader.load({
          key,
          version: '2.0',
          plugins: ['AMap.Scale'],
        });
      }
      return loadPromise;
    }

    function applyMarkerStyles(selId) {
      overlayMap.forEach((entry, id) => {
        const selected = id === selId;
        entry.overlay.setzIndex(selected ? 200 : 100);
        entry.overlay.setLabel({
          content: markerLabelHtml(entry.data, selected, markerHeat[id]),
          direction: 'top',
        });
      });
    }

    async function renderMap() {
      if (!line || ((line.path?.length ?? 0) < 2 && !(line.markers?.length))) {
        setStatus('暂无该线路 GIS 数据', false);
        return;
      }
      if (!amapCfg?.enabled || !amapCfg?.apiKey) {
        setStatus('高德地图未配置或暂无线路数据', false);
        return;
      }

      setStatus('加载高德地图…', false);
      try {
        const AMap = await loadAmap();
        if (map) {
          map.destroy();
          map = null;
          overlayMap.clear();
        }

        const center =
          line.center ||
          line.path?.[0] || [line.markers?.[0]?.lng ?? 104.06, line.markers?.[0]?.lat ?? 30.57];

        map = new AMap.Map('map', {
          zoom: line.zoom ?? 13,
          center,
          viewMode: '2D',
        });
        map.addControl(new AMap.Scale());

        const overlays = [];
        if (line.path?.length >= 2) {
          const pl = new AMap.Polyline({
            path: line.path.map(([lng, lat]) => [lng, lat]),
            strokeColor: '#0891b2',
            strokeWeight: 5,
            lineJoin: 'round',
          });
          map.add(pl);
          overlays.push(pl);
        }

        for (const m of line.markers || []) {
          const selected = m.id === selectedId;
          const marker = new AMap.Marker({
            position: [m.lng, m.lat],
            title: m.label,
            zIndex: selected ? 200 : 100,
            label: {
              content: markerLabelHtml(m, selected, markerHeat[m.id]),
              direction: 'top',
            },
            cursor: 'pointer',
          });
          marker.on('click', () => {
            selectedId = selectedId === m.id ? null : m.id;
            applyMarkerStyles(selectedId);
            postToHost({ action: 'markerSelect', markerId: selectedId });
            if (selectedId) map.setCenter([m.lng, m.lat]);
          });
          map.add(marker);
          overlays.push(marker);
          overlayMap.set(m.id, { overlay: marker, data: m });
        }

        const fitKey = geometryKey(line);
        if (fitKey !== lastFitKey && overlays.length) {
          lastFitKey = fitKey;
          map.setFitView(overlays, false, [24, 24, 24, 24]);
        }

        setStatus('', true);
        postToHost({ action: 'ready' });
      } catch (e) {
        setStatus(e?.message || '地图加载失败', false);
        postToHost({ action: 'error', message: e?.message });
      }
    }

    function handleMessage(data) {
      if (!data || data.type !== 'duimai-amap') return;
      if (data.action === 'init' || data.action === 'update') {
        amapCfg = data.amapCfg || amapCfg;
        line = data.line || line;
        markerHeat = data.markerHeat || markerHeat;
        if (data.selectedMarkerId !== undefined) selectedId = data.selectedMarkerId;
        renderMap();
        return;
      }
      if (data.action === 'selectMarker') {
        selectedId = data.selectedMarkerId ?? null;
        if (map) {
          applyMarkerStyles(selectedId);
          if (selectedId && line) {
            const m = (line.markers || []).find((x) => x.id === selectedId);
            if (m) map.setCenter([m.lng, m.lat]);
          }
        }
      }
      if (data.action === 'updateHeat') {
        markerHeat = data.markerHeat || {};
        if (map) applyMarkerStyles(selectedId);
      }
    }

    window.addEventListener('message', (e) => handleMessage(e.data));

    document.addEventListener('UniAppJSBridgeReady', () => {
      postToHost({ action: 'bridgeReady' });
    });
  </script>
</body>
</html>
